[build]
  builder = "nixpacks"
  
[build.nixpacks]
  nixPkgs = ["python312", "nodejs_22", "postgresql", "redis"]
  
[build.nixpacks.plan.providers]
  python = "pip"
  node = "npm"

[build.nixpacks.plan.setup]
  python = "pip install -r requirements.txt"
  node = "cd ui && npm install && npm run build"

[deploy]
  numReplicas = 1
  startCommand = "uvicorn ui.backend.server:app --host 0.0.0.0 --port $PORT --workers 1"
  healthcheckPath = "/api/health"
  healthcheckTimeout = 10
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 3

[service]
  name = "polytrade-v7"
  
[env]
  ENVIRONMENT = "production"
  LOG_LEVEL = "INFO"
  PAPER_TRADING = "true"
